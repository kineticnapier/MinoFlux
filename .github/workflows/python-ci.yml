name: Python CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync package and game dependencies
        run: uv sync --extra game --extra dev
      - name: Verify pygame-ce import
        run: uv run --no-sync python -c "import pygame; print(pygame.version.ver)"
      - name: Run tests
        run: uv run --no-sync python -m pytest -q
      - name: Run headless smoke simulation
        run: uv run --no-sync python -m minoflux smoke --games 2 --max-pieces 30
      - name: Run heuristic benchmark and replay fixture
        run: uv run --no-sync python -m minoflux benchmark --games 1 --max-pieces 20 --replay-out data/replays/ci-benchmark.json
      - name: Run CEM model and replay fixture
        run: uv run --no-sync python -m minoflux train-cem --generations 1 --population 3 --games 1 --max-pieces 8 --validation-games 1 --model-out data/models/ci-cem.json --replay-out data/replays/ci-cem.json
      - name: Import replay viewer
        run: uv run --no-sync python -c "from minoflux.replay import build_parser; print(build_parser().prog)"
